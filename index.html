<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP/title>

<style>
/* ===== GLOBAL ===== */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(hsl(67, 82%, 11%), #b690cf);
}


.grid-container {
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
    gap: 15px;
    padding: 15px;
}


header {
    grid-area: header;
    background: linear-gradient(hsl(298, 17%, 68%), #3b3e8a);
    color: rgb(31, 28, 28);
    text-align: center;
    padding: 20px;
    border-radius: 10px;
}


.aside {
    grid-area: sidebar;
    background: linear-gradient(hsl(298, 16%, 61%), #2d2c88);
    padding: 15px;
    border-radius: 10px;
    position: sticky;
    top: 10px;
    height: fit-content;
}

.aside h2 {
    color: #fff;
    text-align: center;
    margin-bottom: 15px;
}

.aside ul {
    list-style: none;
    padding: 0;
}

.aside li {
    padding: 15px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.6);
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
}

.aside li:hover {
    background: linear-gradient(hsl(298, 20%, 71%), #4e3fbd);
    color: white;
}


main {
    grid-area: main;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.box {
    background: #ffffff;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(204, 81, 81, 0.3);
}

.box img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 8px;
}

.box h1 {
    font-size: 18px;
}

.box p {
    font-size: 14px;
}

.facts {
    background: rgba(0,0,0,0.4);
    color: white;
    padding: 15px;
    border-radius: 10px;
    grid-column: span 3;
}

.facts h2 {
    margin-top: 0;
}


footer {
    grid-area: footer;
    background: linear-gradient(hsl(308, 45%, 38%), #8f8181);
    color: white;
    text-align: center;
    padding: 25px;
    border-radius: 10px;
}


@media (max-width: 600px) {

    .grid-container {
        grid-template-columns: 1fr;
        grid-template-areas:
            "header"
            "sidebar"
            "main"
            "footer";
    }

    main {
        grid-template-columns: 1fr;
    }

    .aside {
        position: relative;
    }

    .facts {
        grid-column: span 1;
    }
}


@media (min-width: 601px) and (max-width: 1024px) {

    main {
        grid-template-columns: repeat(2, 1fr);
    }

    .facts {
        grid-column: span 2;
    }
}


@media (min-width: 1025px) {

    main {
        grid-template-columns: repeat(3, 1fr);
    }
}
</style>
</head>

<body>

<div class="grid-container">

<header>
    <h1>MVP BROCHURE</h1>
</header>

<div class="aside">
    <h2>OBJECTIVES</h2>
    <ul>
        <li>ARTIST<li>
        <li>SINGER</li>
        <li>DANCER</li>
    </ul>
</div>

<main>
    <div class="box">
        <img src="https://media.interaksyon.com/wp-content/uploads/2023/09/Collage-Maker-04-Sep-2023-07-01-PM-389.jpg">
        <h1>VICE GANDA</h1>
        <p>Comedian/Host</p>
    </div>

    <div class="box">
        <img src="https://deadline.com/wp-content/uploads/2025/09/Andrea-Brillantes2.jpg?w=681&h=383&crop=1">
        <h1>ANDREA BRILLANTES</h1>
        <p>Actress/Influencer</p>
    </div>

    <div class="box">
        <img src="https://contents.pep.ph/images2/images2/2023/12/30/anne-curtis-1703868018.jpg">
        <h1>ANNE CURTIS</h1>
        <p>Actress/Host</p>
    </div>

    <div class="facts">
        <h2>FAMOUS PERSON<h2>
        <p>
            Famous person are widely recognized individuals, often called celebrities or figures of public acclaim, known for thier significant contributions, talents, or influence in fields like entertainment, politics, sports, or science.
        </p>
    </div>
</main>

<footer>
    © MVP BROCHURE.
</footer>

</div>

</body>

</html>
